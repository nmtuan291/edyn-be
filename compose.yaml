services:
  apigateway:
    image: edyn-apigateway
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "5057:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Authority=http://authservice:8080
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__RequireHttpsMetadata=false
      - Cors__AllowedOrigins__0=${FRONTEND_URL}
      - Cors__AllowedOrigins__1=http://localhost:5173
      - Gateway__Downstream__User__Host=userservice
      - Gateway__Downstream__User__Port=8080
      - Gateway__Downstream__User__Scheme=http
      - Gateway__Downstream__Forum__Host=forumservice
      - Gateway__Downstream__Forum__Port=8080
      - Gateway__Downstream__Forum__Scheme=http
      - Gateway__Downstream__Auth__Host=authservice
      - Gateway__Downstream__Auth__Port=8080
      - Gateway__Downstream__Auth__Scheme=http
      - Gateway__Downstream__Notification__Host=notificationservice
      - Gateway__Downstream__Notification__Port=8080
      - Gateway__Downstream__Notification__Scheme=http
      - Gateway__Downstream__Chat__Host=chatservice
      - Gateway__Downstream__Chat__Port=8080
      - Gateway__Downstream__Chat__Scheme=http
    restart: unless-stopped
    depends_on:
      - authservice
      - userservice
      - forumservice
      - chatservice
      - notificationservice

  authservice:
    image: edyn-authservice
    build:
      context: .
      dockerfile: Services/AuthService/Dockerfile
    ports:
      - "5299:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Grpc__UserServiceUrl=http://userservice:8080
      - ConnectionStrings__WebApiDatabase=${AUTH_DB_CONNECTION}
      - Jwt__Authority=http://authservice:8080
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=edyn_auth
      - Jwt__RequireHttpsMetadata=false
    restart: unless-stopped

  userservice:
    image: edyn-userservice
    build:
      context: .
      dockerfile: Services/UserService/Dockerfile
    ports:
      - "5161:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__WebApiDatabase=${USER_DB_CONNECTION}
      - Jwt__Authority=http://authservice:8080
      - Jwt__Audience=edyn_user
      - Jwt__RequireHttpsMetadata=false
    restart: unless-stopped

  forumservice:
    image: edyn-forumservice
    build:
      context: .
      dockerfile: Services/ForumService/Dockerfile
    ports:
      - "5220:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__WebApiDatabase=${FORUM_DB_CONNECTION}
      - Jwt__Authority=http://authservice:8080
      - Jwt__Audience=edyn_forum
      - Jwt__RequireHttpsMetadata=false
      - RabbitMQ__HostName=${RABBITMQ_HOST}
      - RabbitMQ__Port=${RABBITMQ_PORT}
      - RabbitMQ__UserName=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - RabbitMQ__VirtualHost=${RABBITMQ_VHOST}
      - RabbitMQ__UseTls=true
    restart: unless-stopped

  chatservice:
    image: edyn-chatservice
    build:
      context: .
      dockerfile: Services/ChatService/Dockerfile
    ports:
      - "5033:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__WebApiDatabase=${CHAT_DB_CONNECTION}
      - Jwt__Authority=http://authservice:8080
      - Jwt__Audience=edyn_chat
      - Jwt__RequireHttpsMetadata=false
      - Cors__AllowedOrigins__0=${FRONTEND_URL}
      - Cors__AllowedOrigins__1=http://localhost:5173
      - Redis__ConnectionString=${REDIS_CONNECTION}
      - RabbitMQ__HostName=${RABBITMQ_HOST}
      - RabbitMQ__Port=${RABBITMQ_PORT}
      - RabbitMQ__UserName=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - RabbitMQ__VirtualHost=${RABBITMQ_VHOST}
      - RabbitMQ__UseTls=true
    restart: unless-stopped

  notificationservice:
    image: edyn-notificationservice
    build:
      context: .
      dockerfile: Services/NotificationService/Dockerfile
    ports:
      - "5190:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__WebApiDatabase=${NOTIFICATION_DB_CONNECTION}
      - Jwt__Authority=http://authservice:8080
      - Jwt__Audience=edyn_notification
      - Jwt__RequireHttpsMetadata=false
      - Cors__AllowedOrigins__0=${FRONTEND_URL}
      - Cors__AllowedOrigins__1=http://localhost:5173
      - Redis__ConnectionString=${REDIS_CONNECTION}
      - RabbitMQ__HostName=${RABBITMQ_HOST}
      - RabbitMQ__Port=${RABBITMQ_PORT}
      - RabbitMQ__UserName=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - RabbitMQ__VirtualHost=${RABBITMQ_VHOST}
      - RabbitMQ__UseTls=true
    restart: unless-stopped

