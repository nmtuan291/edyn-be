services:
  postgres:
    image: postgres:15-alpine
    container_name: edyn-postgres-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: edyn-rabbitmq-local
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: edyn-redis-local
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data_local:
