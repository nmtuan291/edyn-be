syntax = "proto3";

package edyn;

option csharp_namespace = "AuthService.Grpc";

service AccountService {
  rpc GetAccountById (AccountRequest) returns (AccountResponse);
}

message AccountRequest {
  string id = 1;
}

message AccountResponse {
  string id = 1;
  string username = 2;
  string email = 3;
  bool is_active = 4;
}
