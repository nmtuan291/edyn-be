name: Deploy Auth Service
on:
  push:
    branches: [main]
    paths:
      - 'Services/AuthService/**'
      - 'Contracts/**'
      - '.github/workflows/deploy-auth-service.yml'
jobs:
  deploy:
    uses: ./.github/workflows/deploy-service.yml
    with:
      service-name: auth-service
      dockerfile-path: Services/AuthService/Dockerfile
    secrets: inherit
