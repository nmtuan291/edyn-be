name: Deploy User Service
on:
  push:
    branches: [main]
    paths:
      - 'Services/UserService/**'
      - 'Contracts/**'
      - '.github/workflows/deploy-user-service.yml'
jobs:
  deploy:
    uses: ./.github/workflows/deploy-service.yml
    with:
      service-name: user-service
      dockerfile-path: Services/UserService/Dockerfile
    secrets: inherit
