name: Deploy Forum Service
on:
  push:
    branches: [main]
    paths:
      - 'Services/ForumService/**'
      - 'Contracts/**'
      - '.github/workflows/deploy-forum-service.yml'
jobs:
  deploy:
    uses: ./.github/workflows/deploy-service.yml
    with:
      service-name: forum-service
      dockerfile-path: Services/ForumService/Dockerfile
    secrets: inherit
